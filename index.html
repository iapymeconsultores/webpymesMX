// ===== parts/icons.jsx =====
// Lucide icons get loaded as ES module on window.Lucide.
// We expose a small helper that defers rendering until ready.
function LIcon({ name, className = "w-5 h-5", strokeWidth = 1.6, ...rest }) {
  const [ready, setReady] = React.useState(!!window.Lucide);
  React.useEffect(() => {
    if (window.Lucide) return;
    const onReady = () => setReady(true);
    window.addEventListener('lucide-ready', onReady);
    return () => window.removeEventListener('lucide-ready', onReady);
  }, []);
  if (!ready) return <span className={className} aria-hidden="true" />;
  const Cmp = window.Lucide[name];
  if (!Cmp) return <span className={className} />;
  return <Cmp className={className} strokeWidth={strokeWidth} {...rest} />;
}
window.LIcon = LIcon;

      </div>
    </div>
  );
}
window.BrandMark = BrandMark;

// Reveal-on-scroll wrapper
function Reveal({ children, delay = 0, as: As = 'div', className = '' }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          setTimeout(() => el.classList.add('in'), delay);
          obs.unobserve(el);
        }
      });
    }, { threshold: 0.12 });
    obs.observe(el);
    return () => obs.disconnect();
  }, [delay]);
  return <As ref={ref} className={`reveal ${className}`}>{children}</As>;
}
window.Reveal = Reveal;

// Eyebrow label
function Eyebrow({ num, children, className = '' }) {
  return (
    <div className={`flex items-center gap-3 font-mono text-[11px] uppercase tracking-[0.18em] ${className}`}>
      {num && <span className="opacity-60">{num}</span>}

      <span>{children}</span>

  );
}

function CTA() {
  const [form, setForm] = React.useState({ nombre: '', negocio: '', email: '', sector: 'Retail', meta: '' });
  const [sent, setSent] = React.useState(false);
  const [sending, setSending] = React.useState(false);
  const [error, setError] = React.useState('');

  const sectores = ['Retail', 'Servicios', 'Manufactura', 'Restauración', 'Otro'];

  const submit = async (e) => {
    e.preventDefault();
    if (!form.nombre || !form.email) return;
    setSending(true);
    setError('');
    try {
      const data = new FormData();
      data.append('nombre', form.nombre);
      data.append('negocio', form.negocio);
      data.append('email', form.email);
      data.append('sector', form.sector);
      data.append('meta', form.meta);
      data.append('_subject', 'Nueva solicitud de consultoría — propuesta web');
      data.append('_template', 'table');
      data.append('_captcha', 'false');
      const res = await fetch('https://formsubmit.co/ajax/iapymeconsultores@gmail.com', {
        method: 'POST',
        headers: { 'Accept': 'application/json' },
        body: data,
      });
      if (!res.ok) throw new Error('No pudimos enviar su solicitud. Intente de nuevo o escríbanos a iapymeconsultores@gmail.com.');
      setSent(true);
    } catch (err) {
      setError(err.message || 'Ocurrió un error. Inténtelo de nuevo.');
    } finally {
      setSending(false);
    }
  };

  return (
    <section id="cta" className="relative py-20 sm:py-32 bg-ink-950 text-paper-50 overflow-hidden">
